<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인 퀴즈</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">퀴즈판</p>
    <h1>txt 파일로 만드는<br>우리 반 온라인 시험</h1>
    <p class="lead">문제를 적은 txt 파일을 올리면 방 코드가 생겨요. 학생들은 그 코드로 들어와 문제를 풀고, 채점 결과는 선생님 화면에 떠요.</p>

    <div class="choice-grid">
      <a class="choice-card" href="teacher.html">
        <span class="icon">🧑‍🏫</span>
        <p class="title">선생님이에요</p>
        <p class="desc">문제 양식을 내려받아 채운 뒤 업로드하고, 방 코드를 만들고, 채점 결과를 확인해요.</p>
      </a>
      <a class="choice-card" href="student.html">
        <span class="icon">🙋</span>
        <p class="title">학생이에요</p>
        <p class="desc">선생님이 준 방 코드를 입력하고 문제를 풀어요.</p>
      </a>
    </div>
  </div>
</body>
</html>
