<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 화면 | 퀴즈판</title>
<link rel="stylesheet" href="style.css">

<style>
  /* 기본적으로 모든 흰색 카드(.card) 내부의 글씨를 어두운 색(#2c3e50)으로 만듭니다. */
  .card, .card *, 
  #questionList, #questionList *,
  #resultDetail, #resultDetail * {
    color: #2c3e50 !important;
  }

  /* 2. [방 코드 입력] 화면과 [문제 풀기] 화면의 입력창(Input Box) 안의 글씨는 사용자가 입력하는 것이 잘 보이도록 선명한 검은색으로 고정합니다. */
  input {
    color: #000000 !important;
    background-color: #ffffff !important; /* 배경도 확실히 흰색으로 고정 */
  }

  /* 3. 입력창 안에 적혀있는 연한 회색 안내 글씨(플레이스홀더)도 선명한 어두운 회색으로 고정합니다. */
  input::placeholder {
    color: #7f8c8d !important;
    opacity: 1 !important; /* 브라우저 기본 투명도 초기화 */
  }

  /* 4. 단, 파란색 버튼(.btn) 안의 글씨는 흰색으로 유지되어야 잘 보이므로 예외 처리합니다. */
  .btn, .btn * {
    color: #ffffff !important;
  }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="index.html">← 처음으로</a>
    <p class="eyebrow" style="margin-top:16px;">학생 화면</p>
    <h1 id="pageTitle">방 코드로 입장하기</h1>

    <div id="joinView">
      <div class="card">
        <div class="field">
          <label for="roomCodeInput">방 코드</label>
          <input type="text" id="roomCodeInput" placeholder="예: 7K3M9P" maxlength="6" style="text-transform:uppercase; letter-spacing:4px; font-size:20px; text-align:center;">
        </div>
        <div class="field">
          <label for="studentNameInput">이름</label>
          <input type="text" id="studentNameInput" placeholder="이름을 입력해주세요">
        </div>
        <button class="btn btn-primary" id="joinBtn">입장하기</button>
        <div id="joinStatus" class="status-msg"></div>
      </div>
    </div>

    <div id="quizView" style="display:none;">
      <p class="hint" id="quizRoomTitle" style="color:#D6E5DC;"></p>
      <div id="questionList"></div>
      <button class="btn btn-primary" id="submitBtn" style="width:100%;">제출하기</button>
    </div>

    <div id="resultView" style="display:none;">
      <div class="card result-summary">
        <p class="hint">채점 결과</p>
        <div class="big-score" id="bigScore">0/0</div>
        <p class="hint" id="bigPct"></p>
      </div>
      <div class="card">
        <h2>문항별 결과</h2>
        <div id="resultDetail"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="student.js"></script>
</body>
</html>
