<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 화면 | 퀴즈판</title>
<link rel="stylesheet" href="style.css">

<style>
  /* 1. [퀴즈 풀기 화면]과 [결과 화면] 내부의 흰색 카드 글씨만 어두운 색(#2c3e50)으로 바꿉니다. */
  #questionList, #questionList *, 
  #resultView .card, #resultView .card * {
    color: #2c3e50 !important;
  }

  /* 2. [첫 화면 - 방코드 입력 화면]의 글씨는 원래대로 선명한 흰색(#ffffff)으로 유지합니다. */
  #joinView .card, #joinView .card label {
    color: #ffffff !important;
  }

  /* 3. [입력창] 안의 사용자가 입력하는 글씨는 항상 선명한 검은색(#000000)으로 나오게 합니다. */
  input, #joinView .card input {
    color: #000000 !important;
    background-color: #ffffff !important; /* 배경도 확실히 흰색으로 고정 */
  }

  /* 4. [버튼] 안의 글씨는 언제나 흰색(#ffffff)으로 유지합니다. */
  .btn, .btn * {
    color: #ffffff !important;
  }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="index.html">← 처음으로</a>
    <p class="eyebrow" style="margin-top:16px;">학생 화면</p>
    <h1 id="pageTitle">방 코드로 입장하기</h1>

    <div id="joinView">
      <div class="card">
        <div class="field">
          <label for="roomCodeInput">방 코드</label>
          <input type="text" id="roomCodeInput" placeholder="예: 7K3M9P" maxlength="6" style="text-transform:uppercase; letter-spacing:4px; font-size:20px; text-align:center;">
        </div>
        <div class="field">
          <label for="studentNameInput">이름</label>
          <input type="text" id="studentNameInput" placeholder="이름을 입력해주세요">
        </div>
        <button class="btn btn-primary" id="joinBtn">입장하기</button>
        <div id="joinStatus" class="status-msg"></div>
      </div>
    </div>

    <div id="quizView" style="display:none;">
      <p class="hint" id="quizRoomTitle" style="color:#D6E5DC;"></p>
      <div id="questionList"></div>
      <button class="btn btn-primary" id="submitBtn" style="width:100%;">제출하기</button>
    </div>

    <div id="resultView" style="display:none;">
      <div class="card result-summary">
        <p class="hint">채점 결과</p>
        <div class="big-score" id="bigScore">0/0</div>
        <p class="hint" id="bigPct"></p>
      </div>
      <div class="card">
        <h2>문항별 결과</h2>
        <div id="resultDetail"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="student.js"></script>
</body>
</html>
